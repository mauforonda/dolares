name: Actualizar tipo referencial del BCB

on:
  schedule:
    - cron: '0 0-22/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: check, update and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Actualizar
        run: |
          ./datos/referencial_bcb/update_referencial_bcb.py
      - name: Sincronizar rutas CSV legacy
        run: |
          cp datos/referencial_bcb/compra.csv buy_oficial.csv
          cp datos/referencial_bcb/venta.csv sell_oficial.csv
          cp datos/referencial_bcb/compra_completo.csv buy_oficial_completo.csv
          cp datos/referencial_bcb/compra_monto.csv buy_oficial_monto.csv
      - name: Commit
        run: |
          git config --global user.email "dolares-bot@example.com"
          git config --global user.name "dolares-bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "[ci] update referencial bcb"; git push -q origin main)
