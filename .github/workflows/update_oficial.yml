name: Actualizar tipo oficial

on:
  schedule:
    - cron: '0 0-5 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: check, update and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Actualizar
        run: |
          ./datos/oficial/update_oficial.py
      - name: Commit
        run: |
          git config --global user.email "dolares-bot@example.com"
          git config --global user.name "dolares-bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "[ci] update oficial"; git push -q origin main)
